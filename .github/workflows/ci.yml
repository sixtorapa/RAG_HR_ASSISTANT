name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - run: pip install ruff
      - run: ruff check . --ignore E501,E402,F401,F841,E701,F541,F821,F823

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    # Solo si cambian archivos que afectan la imagen
    if: |
      contains(github.event.head_commit.modified, 'Dockerfile') ||
      contains(github.event.head_commit.modified, 'requirements.txt') ||
      contains(github.event.head_commit.modified, 'docker-compose.yml')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hr-kb-assistant:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max